name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node_version: [22.x, 24.x]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}

      - run: yarn install --frozen-lockfile

      - run: yarn build:all

      - run: yarn lint:all

      - run: yarn prettier:check

      - run: yarn list-deprecations

      - run: yarn test

      - run: yarn playwright install chromium

      - run: yarn test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node${{ matrix.node_version }}
          path: |
            e2e-test-report/
            node_modules/.cache/e2e-test-results/
          retention-days: 3
